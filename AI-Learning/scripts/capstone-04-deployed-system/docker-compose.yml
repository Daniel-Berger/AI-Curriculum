# =============================================================================
# Docker Compose for the Deployed AI System
# =============================================================================
# Services:
#   - app: FastAPI application (the AI system)
#   - vectordb: ChromaDB vector database
#   - prometheus: Metrics collection
#   - grafana: Metrics visualization
# =============================================================================

version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VECTOR_DB_HOST=vectordb
      - VECTOR_DB_PORT=8001
      - LOG_LEVEL=info
      - ENVIRONMENT=production
    depends_on:
      vectordb:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  vectordb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - app
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  app_data:
  app_logs:
  chroma_data:
  prometheus_data:
  grafana_data:
